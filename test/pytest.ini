[pytest]
# Pytestの設定

# テストディスカバリのパターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 出力オプション
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# マーカー定義
markers =
    smoke: スモークテスト（基本的な動作確認）
    ui: UI表示のテスト
    api: APIのテスト
    slow: 実行に時間がかかるテスト

# テストパス
testpaths = test
